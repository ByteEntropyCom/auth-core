# --- Database Override ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1

# --- Kafka Override (Crucial for Green Build) ---
# 1. Force the use of the dynamic port from EmbeddedKafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}

# 2. Force PLAINTEXT to override the Pro SSL setting
spring.kafka.security.protocol=PLAINTEXT

# 3. Clear the SSL paths so Spring doesn't crash looking for Aiven files
spring.kafka.ssl.keystore-location=
spring.kafka.ssl.truststore-location=

