# spring.kafka.ssl.truststore-password=${KAFKA_TRUST_PASS:your_aiven_password}



# ==========================================
# RESILIENCE (Critical for "No-Crash" Login)
# ==========================================
# If Kafka is down/unreachable, don't let the Login hang. 
# Give up trying to connect to Kafka after 2 seconds.
spring.kafka.producer.properties.max.block.ms=2000
spring.kafka.producer.acks=all
spring.kafka.producer.properties.delivery.timeout.ms=3000